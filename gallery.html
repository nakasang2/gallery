<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HAKONIWA COLLECTION — 常設展 | HAKONIWA</title>
  <meta name="description" content="10人の作家による常設展。ブラウザの中のギャラリーを、歩いて鑑賞できます。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/gallery.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <!-- ローディング -->
  <div id="loading">
    <div class="loading-inner">
      <div class="loading-logo">HAKONIWA</div>
      <div class="loading-bar"><span></span></div>
      <div class="loading-text">ギャラリーを準備しています…</div>
    </div>
  </div>

  <!-- HUD -->
  <header class="hud-top">
    <a class="hud-back" href="/">← HAKONIWA</a>
    <div class="hud-title">
      <span class="hud-title-main">HAKONIWA COLLECTION</span>
      <span class="hud-title-sub">10人の作家による常設展</span>
    </div>
  </header>

  <div id="hint" class="hint">
    <div class="hint-row"><b>ドラッグ</b> 見回す</div>
    <div class="hint-row"><b>W A S D / 床タップ</b> 移動</div>
    <div class="hint-row"><b>作品クリック</b> 鑑賞</div>
  </div>

  <!-- 作品情報パネル -->
  <aside id="panel" class="panel" aria-hidden="true">
    <button id="panel-close" class="panel-close" aria-label="閉じる">×</button>
    <div class="panel-no" id="panel-no">No. 01</div>
    <h2 class="panel-title" id="panel-title"></h2>
    <div class="panel-artist" id="panel-artist"></div>
    <p class="panel-desc" id="panel-desc"></p>
    <div class="panel-tags" id="panel-tags"></div>
  </aside>

  <script type="module" src="/src/gallery.js"></script>
</body>
</html>
